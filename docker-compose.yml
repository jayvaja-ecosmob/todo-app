version: '3.9'

services:

  mysql:
    image: mysql:8.4
    container_name: todo-mysql
    restart: unless-stopped
    networks:
      - todo-network
    environment:
      MYSQL_ROOT_PASSWORD: root_pass
      MYSQL_DATABASE:      todo_db
      MYSQL_USER:          todo_user
      MYSQL_PASSWORD:      todo_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "todo_user", "-ptodo_pass"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  backend:
    build: ./backend
    container_name: todo-backend
    restart: unless-stopped
    networks:
      - todo-network
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      PORT:        3000
      DB_HOST:     mysql
      DB_PORT:     3306
      DB_USER:     todo_user
      DB_PASSWORD: todo_pass
      DB_NAME:     todo_db
      CORS_ORIGIN: http://localhost
    ports:
      - "3000:3000"

  frontend:
    build: ./frontend
    container_name: todo-frontend
    restart: unless-stopped
    networks:
      - todo-network
    depends_on:
      - backend
    ports:
      - "80:80"

networks:
  todo-network:
    driver: bridge

volumes:
  mysql_data: